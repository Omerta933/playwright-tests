name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Завантажити код з репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановити Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Встановити залежності (npm пакети)
      - name: Install dependencies
        run: npm ci

      # 4. Встановити браузери Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. Запустити тести
      - name: Run Playwright tests
        run: npm test
        env:
          BASE_URL: https://the-internet.herokuapp.com
          TEST_USERNAME: tomsmith
          TEST_PASSWORD: SuperSecretPassword!

      # 6. Зберегти HTML звіт (навіть якщо тести впали)
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 7. Зберегти відео та скріншоти при падінні
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
